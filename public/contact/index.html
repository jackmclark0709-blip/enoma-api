<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Enoma</title>
  <meta name="description" content="Have a question about Enoma? Get in touch — we typically respond within one business day." />
  <link rel="canonical" href="https://enoma.io/contact" />
  <link rel="stylesheet" href="/styles/enoma.css" />
  <link rel="icon" href="/favicon.ico" sizes="any">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8XTG72Y2Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S8XTG72Y2Y');
  </script>
</head>

<body>
<script type="module" src="/partials/nav.js"></script>

<div class="contact-wrap">
  <span class="section-label">Contact</span>
  <h1>Get in touch</h1>
  <p>Questions about Enoma, your website, pricing, or anything else? Send us a message and we'll get back to you within one business day.</p>

  <div class="contact-card">
    <div id="form-view">
      <div class="field">
        <label for="c-name">Your name</label>
        <input type="text" id="c-name" name="name" placeholder="Jack Conway" required />
      </div>
      <div class="field">
        <label for="c-email">Your email</label>
        <input type="email" id="c-email" name="email" placeholder="jack@example.com" required />
      </div>
      <div class="field">
        <label for="c-subject">What's this about?</label>
        <select id="c-subject" name="subject">
          <option value="">Select a topic…</option>
          <option value="Getting started">Getting started with Enoma</option>
          <option value="My website">My existing Enoma website</option>
          <option value="Billing">Billing or subscription</option>
          <option value="Technical issue">Technical issue</option>
          <option value="Other">Something else</option>
        </select>
      </div>
      <div class="field">
        <label for="c-message">Message</label>
        <textarea id="c-message" name="message" placeholder="How can we help?" required></textarea>
      </div>
      <button class="submit-btn" id="contact-submit" type="button">Send message</button>
      <p class="status-msg" id="contact-status"></p>
    </div>

    <div id="success-view" style="display:none; text-align:center; padding: 1rem 0;">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">✓</div>
      <h3 style="color:#0a1628; margin:0 0 0.5rem;">Message sent!</h3>
      <p style="color:#6b7280; font-size:0.95rem; line-height:1.6; margin:0;">We'll get back to you within one business day.</p>
    </div>
  </div>

  <div class="quick-links">
    <a href="/examples" class="quick-link">
      <span class="ql-label">See examples</span>
      <span class="ql-title">Live business websites →</span>
    </a>
    <a href="/pricing" class="quick-link">
      <span class="ql-label">Pricing</span>
      <span class="ql-title">Plans &amp; pricing →</span>
    </a>
  </div>
</div>

<script>
  document.getElementById('contact-submit').addEventListener('click', async () => {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const subject = document.getElementById('c-subject').value;
    const message = document.getElementById('c-message').value.trim();
    const statusEl = document.getElementById('contact-status');
    const btn = document.getElementById('contact-submit');

    statusEl.textContent = '';
    statusEl.className = 'status-msg';

    if (!name || !email || !message) {
      statusEl.textContent = 'Please fill in all required fields.';
      statusEl.classList.add('error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      gtag('event', 'generate_lead', { event_category: 'contact', event_label: 'contact_form' });

      const res = await fetch('/api/send-contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name, email, message,
          business_name: subject || 'Contact form',
          city: '',
          to: 'jack@enoma.io',
          source: 'enoma_contact_page',
          subject: `Enoma contact: ${subject || 'General enquiry'} — ${name}`
        })
      });

      if (!res.ok) throw new Error();

      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    } catch {
      statusEl.textContent = 'Something went wrong. Please try again or email jack@enoma.io directly.';
      statusEl.classList.add('error');
      btn.disabled = false;
      btn.textContent = 'Send message';
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      document.getElementById('contact-submit').click();
    }
  });
</script>

<div id="site-footer"></div>
<script>fetch("/partials/footer.html").then(r=>r.text()).then(h=>{document.getElementById("site-footer").innerHTML=h});</script>
</body>
</html>
