<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Enoma</title>
  <meta name="description" content="Have a question about Enoma? Get in touch — we typically respond within one business day." />
  <link rel="canonical" href="https://enoma.io/contact" />
  <link rel="stylesheet" href="/styles/enoma.css" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8XTG72Y2Y"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-S8XTG72Y2Y');</script>
  <style>
    body { background: #f0f6ff; min-height: 100vh; display: flex; flex-direction: column; }
    .contact-page { flex: 1; max-width: 600px; margin: 0 auto; padding: 4rem 1.5rem 3rem; width: 100%; box-sizing: border-box; }
    .contact-page .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #3882dc; display: block; margin-bottom: 0.5rem; }
    .contact-page h1 { font-family: 'DM Sans', sans-serif; font-size: clamp(1.8rem, 4vw, 2.2rem); font-weight: 800; color: #0a1628; letter-spacing: -0.02em; margin: 0 0 0.6rem; }
    .contact-page > p { color: #5a7a9a; font-size: 0.95rem; line-height: 1.65; margin: 0 0 2rem; }
    .contact-card { background: #fff; border: 1px solid #d4e2f4; border-radius: 20px; padding: 2rem; box-shadow: 0 8px 30px rgba(10,22,40,0.08); margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: #2a4060; margin-bottom: 0.35rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.75rem 1rem; box-sizing: border-box;
      border: 1.5px solid #d4e2f4; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; color: #0a1628;
      background: #f7faff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #3882dc; box-shadow: 0 0 0 3px rgba(56,130,220,0.15); background: #fff; }
    .field textarea { min-height: 120px; resize: vertical; }
    .submit-btn {
      width: 100%; padding: 0.9rem; margin-top: 0.25rem;
      background: #0a1628; color: #fff;
      border: none; border-radius: 999px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(10,22,40,0.25); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .status-msg { font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; color: #5a7a9a; }
    .status-msg.error { color: #d94040; }
    .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem; }
    .quick-link { background: #fff; border: 1px solid #d4e2f4; border-radius: 14px; padding: 1.1rem 1.25rem; text-decoration: none; transition: transform 0.15s ease, border-color 0.15s ease; }
    .quick-link:hover { transform: translateY(-2px); border-color: #7ab3e0; }
    .ql-label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #7ab3e0; margin-bottom: 0.2rem; }
    .ql-title { display: block; font-size: 0.9rem; font-weight: 600; color: #0a1628; }
    #site-footer { margin-top: auto; }
  </style>
</head>
<body>
<script type="module" src="/partials/nav.js"></script>

<div class="contact-page">
  <span class="section-label">Contact</span>
  <h1>Get in touch</h1>
  <p>Questions about Enoma, your website, pricing, or anything else? Send us a message and we'll get back to you within one business day.</p>

  <div class="contact-card">
    <div id="form-view">
      <div class="field"><label for="c-name">Your name</label><input type="text" id="c-name" name="name" placeholder="Jack Conway" required /></div>
      <div class="field"><label for="c-email">Your email</label><input type="email" id="c-email" name="email" placeholder="jack@example.com" required /></div>
      <div class="field">
        <label for="c-subject">What's this about?</label>
        <select id="c-subject" name="subject">
          <option value="">Select a topic…</option>
          <option value="Getting started">Getting started with Enoma</option>
          <option value="My website">My existing Enoma website</option>
          <option value="Billing">Billing or subscription</option>
          <option value="Technical issue">Technical issue</option>
          <option value="Other">Something else</option>
        </select>
      </div>
      <div class="field"><label for="c-message">Message</label><textarea id="c-message" name="message" placeholder="How can we help?" required></textarea></div>
      <button class="submit-btn" id="contact-submit" type="button">Send message →</button>
      <p class="status-msg" id="contact-status"></p>
    </div>
    <div id="success-view" style="display:none; text-align:center; padding: 1.5rem 0;">
      <div style="width:52px;height:52px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 style="font-family:'DM Sans',sans-serif;color:#0a1628;margin:0 0 0.5rem;font-size:1.3rem;">Message sent!</h3>
      <p style="color:#5a7a9a;font-size:0.9rem;line-height:1.6;margin:0;">We'll get back to you within one business day.</p>
    </div>
  </div>

  <div class="quick-links">
    <a href="/examples" class="quick-link"><span class="ql-label">See examples</span><span class="ql-title">Live business websites →</span></a>
    <a href="/pricing" class="quick-link"><span class="ql-label">Pricing</span><span class="ql-title">Plans &amp; pricing →</span></a>
  </div>
</div>

<script>
  document.getElementById('contact-submit').addEventListener('click', async () => {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const subject = document.getElementById('c-subject').value;
    const message = document.getElementById('c-message').value.trim();
    const statusEl = document.getElementById('contact-status');
    const btn = document.getElementById('contact-submit');
    statusEl.textContent = ''; statusEl.className = 'status-msg';
    if (!name || !email || !message) { statusEl.textContent = 'Please fill in all required fields.'; statusEl.classList.add('error'); return; }
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      gtag('event', 'generate_lead', { event_category: 'contact', event_label: 'contact_form' });
      const res = await fetch('/api/send-contact', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, message, business_name: subject || 'Contact form', city: '', to: 'jack@enoma.io', source: 'enoma_contact_page', subject: `Enoma contact: ${subject || 'General enquiry'} — ${name}` })
      });
      if (!res.ok) throw new Error();
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    } catch {
      statusEl.textContent = 'Something went wrong. Please try again or email jack@enoma.io directly.';
      statusEl.classList.add('error'); btn.disabled = false; btn.textContent = 'Send message →';
    }
  });
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') document.getElementById('contact-submit').click(); });
</script>

<div id="site-footer"></div>
<script>fetch("/partials/footer.html").then(r=>r.text()).then(h=>{document.getElementById("site-footer").innerHTML=h});</script>
</body>
</html>
